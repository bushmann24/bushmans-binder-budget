<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Poké Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn { transition: color 0.2s ease-in-out; }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-[100dvh] flex flex-col selection:bg-blue-200 overflow-hidden relative">

    <!-- INITIAL LOADING SCREEN -->
    <div id="initialLoader" class="flex-1 flex flex-col justify-center items-center bg-white z-[100] absolute inset-0 h-full w-full">
        <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <p class="text-blue-600 font-bold animate-pulse">Unlocking Vault...</p>
    </div>

    <!-- SELL MODAL -->
    <div id="sellModal" class="hidden fixed inset-0 bg-black/50 z-[200] flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-2xl font-extrabold text-gray-800 mb-1">Sell Item</h2>
            <p id="sellModalProduct" class="text-blue-600 font-bold mb-4 text-sm"></p>
            
            <input type="hidden" id="sellProductName">
            <input type="hidden" id="sellMaxQty">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Qty to Sell (Max: <span id="sellMaxLabel"></span>)</label>
                    <input type="number" id="sellQty" min="1" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Total Sale Price ($)</label>
                    <input type="number" id="sellTotal" placeholder="Total received for all" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Buyer / Platform</label>
                    <select id="sellPlatform" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none"></select>
                </div>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button type="button" onclick="closeSellModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold p-3 rounded-xl transition-colors">Cancel</button>
                <button type="button" id="confirmSellBtn" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold p-3 rounded-xl shadow-lg shadow-green-200 active:scale-95 transition-all">Confirm Sale</button>
            </div>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="hidden flex-1 flex-col justify-center items-center p-6 bg-gradient-to-br from-blue-50 to-white z-50 h-full w-full absolute inset-0">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100">
            <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-2">Poké Tracker</h1>
            <p id="authSubtitle" class="text-center text-gray-500 mb-8 text-sm">Sign in to your private vault</p>
            
            <input type="email" id="emailInput" placeholder="Email" class="w-full p-4 mb-4 border border-gray-200 rounded-2xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="passwordInput" placeholder="Password" class="w-full p-4 mb-6 border border-gray-200 rounded-2xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <button type="button" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-all">Login</button>
            
            <p id="authToggleText" class="text-sm text-blue-600 mt-6 cursor-pointer hover:text-blue-800 text-center font-semibold transition-colors" onclick="toggleAuthMode()">
                Don't have an account? Create one.
            </p>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="appScreen" class="hidden flex-col h-full w-full">
        <header class="bg-gradient-to-r from-blue-700 to-blue-500 text-white p-5 pt-12 shadow-md flex justify-between items-center rounded-b-2xl shrink-0">
            <h1 class="text-2xl font-extrabold tracking-tight">My Vault</h1>
            <button type="button" id="logoutBtn" class="text-sm bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl backdrop-blur-sm transition-all font-semibold">Logout</button>
        </header>

        <main class="flex-1 overflow-y-auto p-5 pb-5 relative">
            
            <!-- DASHBOARD TAB -->
            <div id="tab-dashboard" class="tab-content active animate-[fadeIn_0.3s_ease-out]">
                <h2 class="text-2xl font-bold mb-5 text-gray-800">Dashboard</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white p-5 rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">Total Invested</p>
                        <p class="text-xl font-extrabold text-blue-600">$<span id="dashInvested">0.00</span></p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">Realized Profit</p>
                        <p class="text-xl font-extrabold text-green-500">$<span id="dashProfit">0.00</span></p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100 col-span-2 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Total Items in Vault</p>
                            <p class="text-3xl font-extrabold text-gray-800"><span id="dashCount">0</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VAULT TAB (Aggregated Stock) -->
            <div id="tab-vault" class="tab-content">
                <h2 class="text-2xl font-bold mb-5 text-gray-800">Inventory Stock</h2>
                <div id="activeList" class="space-y-4"></div>
            </div>

            <!-- ADD ITEM TAB -->
            <div id="tab-add" class="tab-content">
                <h2 class="text-2xl font-bold mb-5 text-gray-800">Log Purchase</h2>
                <div class="bg-white p-6 rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100 space-y-4">
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Purchase Date</label>
                        <input type="date" id="addDate" class="w-full p-4 border border-gray-200 rounded-2xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Product Name</label>
                        <select id="addName" class="w-full p-4 border border-gray-200 rounded-2xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Quantity</label>
                            <input type="number" id="addQty" value="1" min="1" class="w-full p-4 border border-gray-200 rounded-2xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex-[2]">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Total Buy Price ($)</label>
                            <input type="number" id="addBuyPrice" placeholder="$0.00" class="w-full p-4 border border-gray-200 rounded-2xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Buyer / Platform Source</label>
                        <select id="addSource" class="w-full p-4 border border-gray-200 rounded-2xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Invoice (PDF/Image)</label>
                        <input type="file" id="addFile" class="w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-5 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-colors">
                    </div>
                    
                    <button type="button" id="saveItemBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-2xl shadow-lg shadow-blue-200 mt-4 transition-all active:scale-95">Add to Vault</button>
                </div>
            </div>

            <!-- BUY HISTORY TAB -->
            <div id="tab-buyhistory" class="tab-content">
                <h2 class="text-2xl font-bold mb-5 text-gray-800">Purchase Lots</h2>
                <div id="buyHistoryList" class="space-y-4"></div>
            </div>

            <!-- SOLD HISTORY TAB -->
            <div id="tab-history" class="tab-content">
                <h2 class="text-2xl font-bold mb-5 text-gray-800">Sales History</h2>
                <div id="historyList" class="space-y-4"></div>
            </div>

        </main>

        <!-- 5-TAB BOTTOM NAVIGATION -->
        <nav class="bg-white border-t border-gray-100 flex justify-between items-end w-full pb-6 pt-3 px-2 shadow-[0_-10px_40px_rgb(0,0,0,0.05)] rounded-t-3xl shrink-0 z-40">
            <button type="button" onclick="switchTab('dashboard')" class="nav-btn flex-1 flex flex-col items-center text-blue-600">
                <span class="text-xl mb-1">📊</span>
                <span class="text-[9px] font-bold tracking-wide">Dash</span>
            </button>
            
            <button type="button" onclick="switchTab('vault')" class="nav-btn flex-1 flex flex-col items-center text-gray-400 hover:text-blue-500">
                <span class="text-xl mb-1">📦</span>
                <span class="text-[9px] font-bold tracking-wide">Vault</span>
            </button>

            <!-- Floating Add Button -->
            <div class="flex-[1.2] flex justify-center relative">
                <button type="button" onclick="switchTab('add')" class="absolute bottom-1 bg-blue-600 hover:bg-blue-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg shadow-blue-300 border-[5px] border-white active:scale-95 transition-transform z-50">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                </button>
            </div>
            
            <button type="button" onclick="switchTab('buyhistory')" class="nav-btn flex-1 flex flex-col items-center text-gray-400 hover:text-blue-500">
                <span class="text-xl mb-1">🛒</span>
                <span class="text-[9px] font-bold tracking-wide">Bought</span>
            </button>

            <button type="button" onclick="switchTab('history')" class="nav-btn flex-1 flex flex-col items-center text-gray-400 hover:text-blue-500">
                <span class="text-xl mb-1">📜</span>
                <span class="text-[9px] font-bold tracking-wide">Sold</span>
            </button>
        </nav>
    </div>

    <!-- FIREBASE SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsRN6B_bcKnKi03QCUZD7yVnmjXN1-1LE",
            authDomain: "bushmans-binder-budget.firebaseapp.com",
            projectId: "bushmans-binder-budget",
            storageBucket: "bushmans-binder-budget.firebasestorage.app",
            messagingSenderId: "350540491869",
            appId: "1:350540491869:web:9574b7b5460c5ec6f871b4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let globalSettings = { products: [], sources: [] };

        // Set default date to today
        document.getElementById('addDate').valueAsDate = new Date();

        // UI Navigation
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = event.currentTarget;
            if(activeBtn && activeBtn.classList.contains('nav-btn')) {
                activeBtn.classList.remove('text-gray-400');
                activeBtn.classList.add('text-blue-600');
            }
        }

        // Auth Logic
        let isLoginMode = true; 
        window.toggleAuthMode = function() {
            isLoginMode = !isLoginMode;
            document.getElementById("authSubtitle").innerText = isLoginMode ? "Sign in to your private vault" : "Create your private vault";
            document.getElementById("loginBtn").innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById("authToggleText").innerText = isLoginMode ? "Don't have an account? Create one." : "Already have an account? Log in.";
        };

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('initialLoader').classList.add('hidden');
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('flex');
                
                await loadUserSettings();
                loadData();
            } else {
                currentUser = null;
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('flex');
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            if (!email || !password) return alert("Please enter both an email and password.");
            try {
                if (isLoginMode) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (error) { alert(error.message); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // Settings / Dropdown Logic
        async function loadUserSettings() {
            const docRef = doc(db, "user_settings", currentUser.uid);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                globalSettings = docSnap.data();
                if(!globalSettings.products) globalSettings.products = [];
                if(!globalSettings.sources) globalSettings.sources = [];
            } else {
                globalSettings = { products: ["Chinese Gem Vol 4", "English 151 Booster Bundle"], sources: ["eBay", "FB Marketplace", "Local Trade"] };
                await setDoc(docRef, globalSettings);
            }
            renderDropdowns();
        }

        async function updateSettings() {
            await setDoc(doc(db, "user_settings", currentUser.uid), globalSettings);
            renderDropdowns();
        }

        function renderDropdowns() {
            const buildOptions = (arr) => arr.map(item => `<option value="${item}">${item}</option>`).join('') + `<option value="__ADD_NEW__" class="font-bold text-blue-600">+ Add New...</option>`;
            
            const prodHtml = `<option value="" disabled selected>Select Product...</option>` + buildOptions(globalSettings.products);
            document.getElementById('addName').innerHTML = prodHtml;
            
            const sourceHtml = `<option value="" disabled selected>Select Source...</option>` + buildOptions(globalSettings.sources);
            document.getElementById('addSource').innerHTML = sourceHtml;
            document.getElementById('sellPlatform').innerHTML = sourceHtml; // Use same for selling
        }

        // Listen for "+ Add New..." selection
        document.getElementById('addName').addEventListener('change', async (e) => {
            if(e.target.value === '__ADD_NEW__') {
                const newName = prompt("Enter new Product Name:");
                if(newName && newName.trim() !== "") {
                    globalSettings.products.push(newName.trim());
                    await updateSettings();
                    e.target.value = newName.trim();
                } else { e.target.selectedIndex = 0; }
            }
        });

        document.getElementById('addSource').addEventListener('change', async (e) => {
            if(e.target.value === '__ADD_NEW__') {
                const newName = prompt("Enter new Buyer/Platform:");
                if(newName && newName.trim() !== "") {
                    globalSettings.sources.push(newName.trim());
                    await updateSettings();
                    e.target.value = newName.trim();
                } else { e.target.selectedIndex = 0; }
            }
        });
        document.getElementById('sellPlatform').addEventListener('change', async (e) => {
            if(e.target.value === '__ADD_NEW__') {
                const newName = prompt("Enter new Buyer/Platform:");
                if(newName && newName.trim() !== "") {
                    globalSettings.sources.push(newName.trim());
                    await updateSettings();
                    e.target.value = newName.trim();
                } else { e.target.selectedIndex = 0; }
            }
        });

        // Add Purchase Logic
        document.getElementById('saveItemBtn').addEventListener('click', async () => {
            if(!currentUser) return;
            const date = document.getElementById('addDate').value;
            const name = document.getElementById('addName').value;
            const qty = parseInt(document.getElementById('addQty').value);
            const buyPrice = parseFloat(document.getElementById('addBuyPrice').value);
            const source = document.getElementById('addSource').value;
            const file = document.getElementById('addFile').files[0];
            const btn = document.getElementById('saveItemBtn');
            
            if(!date || !name || isNaN(qty) || isNaN(buyPrice) || name === '__ADD_NEW__') {
                alert("Please fill out all fields correctly.");
                return;
            }

            btn.innerText = "Saving...";
            btn.disabled = true;
            
            let fileUrl = "";
            try {
                if(file) {
                    const storageRef = ref(storage, `users/${currentUser.uid}/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    fileUrl = await getDownloadURL(storageRef);
                }
            } catch (err) {
                console.error("Storage Error:", err);
                alert("Failed to upload image. Check storage rules.");
                btn.innerText = "Add to Vault";
                btn.disabled = false;
                return; // Stop the save process if image fails
            }

            try {
                await addDoc(collection(db, "purchases"), {
                    userId: currentUser.uid,
                    date: date,
                    name: name,
                    totalQty: qty,
                    remainingQty: qty,
                    totalBuyPrice: buyPrice,
                    unitCost: buyPrice / qty,
                    source: source,
                    fileUrl: fileUrl,
                    timestamp: new Date().toISOString()
                });

                document.getElementById('addQty').value = '1';
                document.getElementById('addBuyPrice').value = '';
                document.getElementById('addFile').value = '';
                document.getElementById('addName').selectedIndex = 0;
                
                btn.innerText = "Add to Vault";
                btn.disabled = false;
                
                switchTab('vault');
                loadData();
            } catch (error) {
                console.error("Firestore Error:", error);
                alert("Database save failed. Check Firestore rules.");
                btn.innerText = "Add to Vault";
                btn.disabled = false;
            }
        });

        // Fetch & Render Data
        async function loadData() {
            if(!currentUser) return;
            
            try {
                // Fetch all purchases
                const qPurchases = query(collection(db, "purchases"), where("userId", "==", currentUser.uid));
                const snapPurchases = await getDocs(qPurchases);
                
                // Fetch all sales
                const qSales = query(collection(db, "sales"), where("userId", "==", currentUser.uid));
                const snapSales = await getDocs(qSales);

                let allPurchases = [];
                snapPurchases.forEach(doc => allPurchases.push({ id: doc.id, ...doc.data() }));
                
                // Sort purchases by date string (oldest first for FIFO)
                allPurchases.sort((a, b) => new Date(a.date) - new Date(b.date));

                let allSales = [];
                let totalRealizedProfit = 0;
                snapSales.forEach(doc => {
                    let d = doc.data();
                    allSales.push({ id: doc.id, ...d });
                    totalRealizedProfit += (d.totalSalePrice - d.totalCostBasis);
                });
                // Sort sales newest first
                allSales.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                // Aggregate Vault & Calculate Dash Stats
                let vaultAgg = {};
                let totalInvestedActive = 0;
                let totalActiveItems = 0;
                let buyHistoryHtml = '';

                // Loop oldest to newest for rendering buy history exactly as bought
                allPurchases.forEach(p => {
                    // Build Buy History Card
                    buyHistoryHtml = `
                        <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-[0_4px_20px_rgb(0,0,0,0.03)] mb-3">
                            <div class="flex justify-between mb-1 items-center">
                                <h3 class="font-bold text-gray-800">${p.name}</h3>
                                <span class="text-xs text-gray-400 font-bold">${p.date}</span>
                            </div>
                            <div class="flex justify-between text-sm items-end mt-2">
                                <div>
                                    <p class="text-gray-500 font-medium">Bought: <span class="font-bold text-gray-800">${p.totalQty}</span> from ${p.source}</p>
                                    <p class="text-gray-500 font-medium text-xs mt-1">Remaining: ${p.remainingQty}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold text-red-500">$${p.totalBuyPrice.toFixed(2)}</p>
                                    <p class="text-xs text-gray-400 font-bold">@ $${p.unitCost.toFixed(2)}/ea</p>
                                </div>
                            </div>
                        </div>
                    ` + buyHistoryHtml; // Prepend to show newest at top

                    // Aggregate for Vault
                    if(p.remainingQty > 0) {
                        totalActiveItems += p.remainingQty;
                        totalInvestedActive += (p.remainingQty * p.unitCost);
                        
                        if(!vaultAgg[p.name]) {
                            vaultAgg[p.name] = { name: p.name, totalQty: 0, totalCost: 0 };
                        }
                        vaultAgg[p.name].totalQty += p.remainingQty;
                        vaultAgg[p.name].totalCost += (p.remainingQty * p.unitCost);
                    }
                });

                // Render Vault
                let vaultHtml = '';
                Object.values(vaultAgg).forEach(item => {
                    let avgCost = item.totalCost / item.totalQty;
                    vaultHtml += `
                        <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-[0_4px_20px_rgb(0,0,0,0.03)]">
                            <div class="flex justify-between mb-3 items-start">
                                <div>
                                    <h3 class="font-extrabold text-gray-800 text-lg leading-tight">${item.name}</h3>
                                    <p class="text-xs text-gray-400 font-bold mt-1">Avg Cost: $${avgCost.toFixed(2)}/ea</p>
                                </div>
                                <div class="bg-blue-50 text-blue-700 text-sm px-3 py-1.5 rounded-full font-bold whitespace-nowrap text-center min-w-[3rem]">
                                    x${item.totalQty}
                                </div>
                            </div>
                            <div class="mt-4 border-t border-gray-100 pt-4 flex justify-between items-center">
                                <p class="text-sm text-gray-500 font-medium">Total Value: <span class="font-bold text-gray-800">$${item.totalCost.toFixed(2)}</span></p>
                                <button type="button" onclick="openSellModal('${item.name}', ${item.totalQty})" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md active:scale-95 transition-all">Sell</button>
                            </div>
                        </div>
                    `;
                });

                // Render Sales History
                let salesHtml = '';
                allSales.forEach(s => {
                    let profit = s.totalSalePrice - s.totalCostBasis;
                    salesHtml += `
                        <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100 opacity-90">
                            <div class="flex justify-between mb-2">
                                <h3 class="font-extrabold text-gray-700">${s.name} <span class="text-blue-600">x${s.qtySold}</span></h3>
                                <span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded-full font-bold uppercase">Sold</span>
                            </div>
                            <div class="flex justify-between text-sm font-medium mt-2">
                                <p class="text-gray-500 text-xs">To: ${s.platform}</p>
                                <p class="text-gray-400 text-xs">${new Date(s.timestamp).toLocaleDateString()}</p>
                            </div>
                            <div class="mt-3 pt-3 border-t border-gray-200 flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-gray-400 uppercase font-bold">Cost / Sale</p>
                                    <p class="text-sm font-bold text-gray-600">$${s.totalCostBasis.toFixed(2)} / $${s.totalSalePrice.toFixed(2)}</p>
                                </div>
                                <p class="font-extrabold text-lg ${profit >= 0 ? 'text-green-500' : 'text-red-500'}">
                                    ${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}
                                </p>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('activeList').innerHTML = vaultHtml || '<p class="text-gray-400 text-center py-10 font-medium">Vault is empty.</p>';
                document.getElementById('buyHistoryList').innerHTML = buyHistoryHtml || '<p class="text-gray-400 text-center py-10 font-medium">No purchases yet.</p>';
                document.getElementById('historyList').innerHTML = salesHtml || '<p class="text-gray-400 text-center py-10 font-medium">No sales recorded yet.</p>';
                
                document.getElementById('dashInvested').innerText = totalInvestedActive.toFixed(2);
                document.getElementById('dashProfit').innerText = totalRealizedProfit.toFixed(2);
                document.getElementById('dashCount').innerText = totalActiveItems;
                
                // Store fetched active lots globally so the FIFO logic can use them without re-fetching
                window.currentActiveLots = allPurchases.filter(p => p.remainingQty > 0);

            } catch (error) {
                console.error("Error loading data:", error);
                alert("Failed to load your vault data.");
            }
        }

        // Sell Modal Logic (FIFO)
        window.openSellModal = function(productName, maxQty) {
            document.getElementById('sellProductName').value = productName;
            document.getElementById('sellModalProduct').innerText = productName;
            document.getElementById('sellMaxQty').value = maxQty;
            document.getElementById('sellMaxLabel').innerText = maxQty;
            
            document.getElementById('sellQty').value = '';
            document.getElementById('sellQty').max = maxQty;
            document.getElementById('sellTotal').value = '';
            document.getElementById('sellPlatform').selectedIndex = 0;
            
            document.getElementById('sellModal').classList.remove('hidden');
        }

        window.closeSellModal = function() {
            document.getElementById('sellModal').classList.add('hidden');
        }

        document.getElementById('confirmSellBtn').addEventListener('click', async () => {
            const name = document.getElementById('sellProductName').value;
            let qtyToSell = parseInt(document.getElementById('sellQty').value);
            const maxQty = parseInt(document.getElementById('sellMaxQty').value);
            const totalSalePrice = parseFloat(document.getElementById('sellTotal').value);
            const platform = document.getElementById('sellPlatform').value;
            const btn = document.getElementById('confirmSellBtn');

            if(isNaN(qtyToSell) || qtyToSell <= 0 || qtyToSell > maxQty || isNaN(totalSalePrice) || !platform || platform === '__ADD_NEW__') {
                alert("Please fill out all fields correctly."); return;
            }

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // Get active lots for this product, already sorted oldest first in loadData()
                let lots = window.currentActiveLots.filter(p => p.name === name);
                let totalCostBasis = 0;
                let initialQtyToSell = qtyToSell;

                // FIFO Logic: deduct from oldest lots first
                for (let lot of lots) {
                    if (qtyToSell <= 0) break;
                    
                    let takeFromThisLot = Math.min(lot.remainingQty, qtyToSell);
                    let costForTaken = takeFromThisLot * lot.unitCost;
                    
                    totalCostBasis += costForTaken;
                    qtyToSell -= takeFromThisLot;
                    
                    let newRemaining = lot.remainingQty - takeFromThisLot;
                    
                    // Update the lot in Firestore
                    await updateDoc(doc(db, "purchases", lot.id), {
                        remainingQty: newRemaining
                    });
                }

                // Record the overall Sale
                await addDoc(collection(db, "sales"), {
                    userId: currentUser.uid,
                    name: name,
                    qtySold: initialQtyToSell,
                    totalSalePrice: totalSalePrice,
                    totalCostBasis: totalCostBasis,
                    platform: platform,
                    timestamp: new Date().toISOString()
                });

                closeSellModal();
                btn.innerText = "Confirm Sale";
                btn.disabled = false;
                loadData(); // Refresh UI

            } catch (error) {
                console.error("Sell Error:", error);
                alert("Failed to process sale.");
                btn.innerText = "Confirm Sale";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
