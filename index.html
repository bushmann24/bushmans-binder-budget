<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Poké Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col">

    <div id="loginScreen" class="flex-1 flex flex-col justify-center items-center p-6 bg-white z-50 h-full w-full absolute inset-0">
        <div class="w-full max-w-sm">
            <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-2">Poké Tracker</h1>
            <p class="text-center text-gray-500 mb-8">Sign in to your private vault</p>
            <input type="email" id="emailInput" placeholder="Email" class="w-full p-3 mb-4 border rounded-xl bg-gray-50">
            <input type="password" id="passwordInput" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl bg-gray-50">
            <button id="loginBtn" class="w-full bg-blue-600 text-white font-bold p-3 rounded-xl mb-4 shadow-md active:scale-95 transition-transform">Login / Register</button>
        </div>
    </div>

    <div id="appScreen" class="hidden flex-col h-full">
        <header class="bg-blue-600 text-white p-4 pt-10 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold">My Vault</h1>
            <button id="logoutBtn" class="text-sm bg-blue-700 px-3 py-1 rounded-lg">Logout</button>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24">
            
            <div id="tab-dashboard" class="tab-content active">
                <h2 class="text-2xl font-bold mb-4">Dashboard</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border">
                        <p class="text-xs text-gray-500 font-bold uppercase">Invested</p>
                        <p class="text-xl font-extrabold text-blue-600">$<span id="dashInvested">0.00</span></p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border">
                        <p class="text-xs text-gray-500 font-bold uppercase">Net Profit</p>
                        <p class="text-xl font-extrabold text-green-600">$<span id="dashProfit">0.00</span></p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border col-span-2">
                        <p class="text-xs text-gray-500 font-bold uppercase">Active Cards</p>
                        <p class="text-2xl font-extrabold text-gray-800"><span id="dashCount">0</span></p>
                    </div>
                </div>
            </div>

            <div id="tab-vault" class="tab-content">
                <h2 class="text-2xl font-bold mb-4">Active Vault</h2>
                <div id="activeList" class="space-y-3">
                    </div>
            </div>

            <div id="tab-add" class="tab-content">
                <h2 class="text-2xl font-bold mb-4">Log Purchase</h2>
                <div class="bg-white p-5 rounded-2xl shadow-sm border space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Card Name</label>
                        <input type="text" id="addName" placeholder="e.g. Charizard Base Set" class="w-full p-3 border rounded-xl bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Total Buy Price (Including Fees/Tax)</label>
                        <input type="number" id="addBuyPrice" placeholder="$" class="w-full p-3 border rounded-xl bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Platform Source</label>
                        <select id="addSource" class="w-full p-3 border rounded-xl bg-gray-50">
                            <option>FB Marketplace</option>
                            <option>eBay</option>
                            <option>Local Trade</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Upload Invoice (PDF/Image)</label>
                        <input type="file" id="addFile" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <button id="saveItemBtn" class="w-full bg-blue-600 text-white font-bold p-3 rounded-xl shadow-md mt-2">Add to Vault</button>
                </div>
            </div>

            <div id="tab-history" class="tab-content">
                <h2 class="text-2xl font-bold mb-4">Sales History</h2>
                <div id="historyList" class="space-y-3">
                    </div>
            </div>

        </main>

        <nav class="bg-white border-t p-4 flex justify-between absolute bottom-0 w-full pb-8">
            <button onclick="switchTab('dashboard')" class="flex-1 text-center font-bold text-gray-400 hover:text-blue-600">📊 Dash</button>
            <button onclick="switchTab('vault')" class="flex-1 text-center font-bold text-gray-400 hover:text-blue-600">📦 Vault</button>
            <button onclick="switchTab('add')" class="flex-1 text-center font-bold text-blue-600 text-2xl -mt-2">➕</button>
            <button onclick="switchTab('history')" class="flex-1 text-center font-bold text-gray-400 hover:text-blue-600">📜 Sold</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // 🚨 REPLACE THIS OBJECT WITH YOUR FIREBASE CONFIG KEYS 🚨
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;

        // UI Elements
        const loginScreen = document.getElementById('loginScreen');
        const appScreen = document.getElementById('appScreen');
        
        // Tab Switcher Logic
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                appScreen.classList.add('flex');
                loadData();
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
                appScreen.classList.remove('flex');
            }
        });

        // Simple Login/Register
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                // If account doesn't exist, create it
                if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                    } catch (err) {
                        alert(err.message);
                    }
                } else {
                    alert(error.message);
                }
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // Add Item Logic
        document.getElementById('saveItemBtn').addEventListener('click', async () => {
            if(!currentUser) return;
            const name = document.getElementById('addName').value;
            const buyPrice = document.getElementById('addBuyPrice').value;
            const source = document.getElementById('addSource').value;
            const file = document.getElementById('addFile').files[0];
            
            if(!name || !buyPrice) {
                alert("Please fill in Name and Buy Price.");
                return;
            }

            document.getElementById('saveItemBtn').innerText = "Saving...";
            
            let fileUrl = "";
            if(file) {
                const storageRef = ref(storage, `invoices/${currentUser.uid}/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                fileUrl = await getDownloadURL(storageRef);
            }

            await addDoc(collection(db, "cards"), {
                userId: currentUser.uid, // Strict Privacy Lock
                name: name,
                buyPrice: parseFloat(buyPrice),
                source: source,
                fileUrl: fileUrl,
                status: "active", // 'active' or 'sold'
                sellPrice: 0,
                dateAdded: new Date()
            });

            document.getElementById('addName').value = '';
            document.getElementById('addBuyPrice').value = '';
            document.getElementById('addFile').value = '';
            document.getElementById('saveItemBtn').innerText = "Add to Vault";
            
            switchTab('vault');
            loadData();
        });

        // Fetch & Render Data
        async function loadData() {
            if(!currentUser) return;
            const q = query(collection(db, "cards"), where("userId", "==", currentUser.uid));
            const querySnapshot = await getDocs(q);
            
            let activeHtml = '';
            let historyHtml = '';
            let totalInvested = 0;
            let totalProfit = 0;
            let activeCount = 0;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                
                if(data.status === 'active') {
                    totalInvested += data.buyPrice;
                    activeCount++;
                    activeHtml += `
                        <div class="bg-white p-4 rounded-xl border shadow-sm">
                            <div class="flex justify-between mb-2">
                                <h3 class="font-bold text-gray-800">${data.name}</h3>
                                <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-lg">${data.source}</span>
                            </div>
                            <p class="text-sm text-gray-500 mb-3">Cost: <span class="font-bold text-red-500">$${data.buyPrice.toFixed(2)}</span></p>
                            ${data.fileUrl ? `<a href="${data.fileUrl}" target="_blank" class="text-xs text-blue-600 underline block mb-3">📄 View Invoice</a>` : ''}
                            
                            <div class="flex gap-2">
                                <input type="number" id="sell_${id}" placeholder="Final Net Return ($)" class="w-full p-2 border rounded-lg text-sm bg-gray-50">
                                <button onclick="window.markSold('${id}', ${data.buyPrice})" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Sell</button>
                            </div>
                        </div>
                    `;
                } else {
                    const profit = data.sellPrice - data.buyPrice;
                    totalProfit += profit;
                    historyHtml += `
                        <div class="bg-white p-4 rounded-xl border shadow-sm opacity-80">
                            <div class="flex justify-between mb-1">
                                <h3 class="font-bold text-gray-800 line-through">${data.name}</h3>
                                <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-lg">SOLD</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <p class="text-gray-500">Bought: $${data.buyPrice.toFixed(2)}</p>
                                <p class="text-gray-500">Net Return: $${data.sellPrice.toFixed(2)}</p>
                            </div>
                            <p class="text-right font-bold mt-2 ${profit >= 0 ? 'text-green-600' : 'text-red-600'}">
                                ${profit >= 0 ? '+' : ''}$${profit.toFixed(2)} Profit
                            </p>
                        </div>
                    `;
                }
            });

            document.getElementById('activeList').innerHTML = activeHtml || '<p class="text-gray-400 text-center mt-6">Vault is empty.</p>';
            document.getElementById('historyList').innerHTML = historyHtml || '<p class="text-gray-400 text-center mt-6">No sales yet.</p>';
            
            document.getElementById('dashInvested').innerText = totalInvested.toFixed(2);
            document.getElementById('dashProfit').innerText = totalProfit.toFixed(2);
            document.getElementById('dashCount').innerText = activeCount;
        }

        // Mark as Sold Logic
        window.markSold = async function(id, buyPrice) {
            const sellInput = document.getElementById(`sell_${id}`).value;
            if(!sellInput) {
                alert("Please enter the final net return amount.");
                return;
            }
            
            await updateDoc(doc(db, "cards", id), {
                status: "sold",
                sellPrice: parseFloat(sellInput)
            });
            
            loadData();
        }
    </script>
</body>
</html>
